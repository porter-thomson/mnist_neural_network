<svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="520" height="320" fill="#ffffff" />

  <!-- Edges from x1 (highlighted blue) -->
  <line x1="150" y1="100" x2="370" y2="60"  stroke="#FF0000" stroke-width="2" />
  <line x1="150" y1="100" x2="370" y2="160" stroke="#FF0000" stroke-width="2" />
  <line x1="150" y1="100" x2="370" y2="260" stroke="#FF0000" stroke-width="2" />

  <!-- Edges from x2 -->
  <line x1="150" y1="220" x2="370" y2="60"  stroke="#888" stroke-width="1.5" />
  <line x1="150" y1="220" x2="370" y2="160" stroke="#888" stroke-width="1.5" />
  <line x1="150" y1="220" x2="370" y2="260" stroke="#888" stroke-width="1.5" />

  <!-- Input nodes -->
  <circle cx="150" cy="100" r="22" fill="#cfe2ff" stroke="#1f4e8c" stroke-width="2" />
  <text x="150" y="105" text-anchor="middle" font-size="15" fill="#1f4e8c">x1</text>

  <circle cx="150" cy="220" r="22" fill="#cfe2ff" stroke="#1f4e8c" stroke-width="2" />
  <text x="150" y="225" text-anchor="middle" font-size="15" fill="#1f4e8c">x2</text>

  <!-- Hidden nodes -->
  <circle cx="370" cy="60" r="22" fill="#d7f0d2" stroke="#2f7a3d" stroke-width="2" />
  <text x="370" y="65" text-anchor="middle" font-size="15" fill="#2f7a3d">h1</text>

  <circle cx="370" cy="160" r="22" fill="#d7f0d2" stroke="#2f7a3d" stroke-width="2" />
  <text x="370" y="165" text-anchor="middle" font-size="15" fill="#2f7a3d">h2</text>

  <circle cx="370" cy="260" r="22" fill="#d7f0d2" stroke="#2f7a3d" stroke-width="2" />
  <text x="370" y="265" text-anchor="middle" font-size="15" fill="#2f7a3d">h3</text>

  <!-- Layer labels -->
  <text x="150" y="300" text-anchor="middle" font-size="14" fill="#333">Input Layer</text>
  <text x="370" y="300" text-anchor="middle" font-size="14" fill="#333">Hidden Layer</text>
</svg>