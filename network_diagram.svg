<svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="520" height="320" fill="#ffffff" />

  <!-- Edges: input -> hidden -->
  <line x1="90" y1="100" x2="260" y2="60"  stroke="#888" stroke-width="1.5" />
  <line x1="90" y1="100" x2="260" y2="160" stroke="#888" stroke-width="1.5" />
  <line x1="90" y1="100" x2="260" y2="260" stroke="#888" stroke-width="1.5" />
  <line x1="90" y1="220" x2="260" y2="60"  stroke="#888" stroke-width="1.5" />
  <line x1="90" y1="220" x2="260" y2="160" stroke="#888" stroke-width="1.5" />
  <line x1="90" y1="220" x2="260" y2="260" stroke="#888" stroke-width="1.5" />

  <!-- Edges: hidden -> output -->
  <line x1="260" y1="60"  x2="430" y2="160" stroke="#888" stroke-width="1.5" />
  <line x1="260" y1="160" x2="430" y2="160" stroke="#888" stroke-width="1.5" />
  <line x1="260" y1="260" x2="430" y2="160" stroke="#888" stroke-width="1.5" />

  <!-- Input nodes -->
  <circle cx="90" cy="100" r="22" fill="#cfe2ff" stroke="#1f4e8c" stroke-width="2" />
  <text x="90" y="105" text-anchor="middle" font-size="15" fill="#1f4e8c">x1</text>

  <circle cx="90" cy="220" r="22" fill="#cfe2ff" stroke="#1f4e8c" stroke-width="2" />
  <text x="90" y="225" text-anchor="middle" font-size="15" fill="#1f4e8c">x2</text>

  <!-- Hidden nodes -->
  <circle cx="260" cy="60" r="22" fill="#d7f0d2" stroke="#2f7a3d" stroke-width="2" />
  <text x="260" y="65" text-anchor="middle" font-size="15" fill="#2f7a3d">h1</text>

  <circle cx="260" cy="160" r="22" fill="#d7f0d2" stroke="#2f7a3d" stroke-width="2" />
  <text x="260" y="165" text-anchor="middle" font-size="15" fill="#2f7a3d">h2</text>

  <circle cx="260" cy="260" r="22" fill="#d7f0d2" stroke="#2f7a3d" stroke-width="2" />
  <text x="260" y="265" text-anchor="middle" font-size="15" fill="#2f7a3d">h3</text>

  <!-- Output node -->
  <circle cx="430" cy="160" r="22" fill="#f9d9c4" stroke="#a3461c" stroke-width="2" />
  <text x="430" y="165" text-anchor="middle" font-size="15" fill="#a3461c">y</text>

  <!-- Layer labels -->
  <text x="90"  y="300" text-anchor="middle" font-size="14" fill="#333">Input Layer</text>
  <text x="260" y="300" text-anchor="middle" font-size="14" fill="#333">Hidden Layer</text>
  <text x="430" y="300" text-anchor="middle" font-size="14" fill="#333">Output Layer</text>
</svg>